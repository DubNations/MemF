workflow_config:
  name: "cognitive_rag"
  nodes:
    - name: "START"
      edges: ["rewrite"]
    
    - name: "rewrite"
      edges: ["retrieve"]
    
    - name: "retrieve"
      edges: ["conflict_check"]
    
    - name: "conflict_check"
      edges: ["skill_execution", "rule_inference"]
    
    - name: "skill_execution"
      edges: ["generate"]
    
    - name: "rule_inference"
      edges: ["generate"]
    
    - name: "generate"
      edges: ["END"]

max_history: 10

reranker_config:
  supplier: "cohere"
  model: "rerank-multilingual-v3.0"
  top_n: 5
  enabled: true

llm_config:
  max_input_tokens: 4000
  temperature: 0.7